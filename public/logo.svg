<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" xml:space="preserve">
  <!-- Anima Companion logo — circular white background with paw print + decorative lines -->
  <defs>
    <clipPath id="circle">
      <circle cx="32" cy="32" r="32" />
    </clipPath>
  </defs>

  <!-- White circular background -->
  <circle cx="32" cy="32" r="32" fill="#FFFFFF" />

  <!-- Subtle decorative gray lines (faded, abstract) -->
  <g clip-path="url(#circle)" opacity="0.06" stroke="#000000" stroke-width="0.5" fill="none">
    <path d="M 4 22 Q 32 14 60 22" />
    <path d="M 4 32 Q 32 24 60 32" />
    <path d="M 4 42 Q 32 34 60 42" />
    <path d="M 22 4 Q 14 32 22 60" />
    <path d="M 32 4 Q 24 32 32 60" />
    <path d="M 42 4 Q 34 32 42 60" />
  </g>

  <!-- 4 toe pads (purple) -->
  <ellipse cx="18" cy="22" rx="4.5" ry="6" fill="#7C3AED" />
  <ellipse cx="28" cy="16" rx="4.5" ry="6" fill="#7C3AED" />
  <ellipse cx="38" cy="16" rx="4.5" ry="6" fill="#7C3AED" />
  <ellipse cx="46" cy="22" rx="4.5" ry="6" fill="#7C3AED" />

  <!-- Central pad (orange) -->
  <path
    d="M32 28c-7 0-13 5-13 12 0 5 4 8.5 7 8.5 2 0 3.5-0.7 4.7-1.4 1.2-0.7 1.9-0.7 2.6 0 1.2 0.7 2.7 1.4 4.7 1.4 3 0 7-3.5 7-8.5 0-7-6-12-13-12z"
    fill="#F97316"
  />

  <!-- White heart cutout in orange pad -->
  <path
    d="M32 41c-0.9-0.9-2.2-0.9-3 0-0.5 0.5-0.6 1.2-0.4 1.8 0.4 1 1.7 1.7 3.4 2.8 1.7-1.1 3-1.8 3.4-2.8 0.2-0.6 0.1-1.3-0.4-1.8-0.8-0.9-2.1-0.9-3 0z"
    fill="#FFFFFF"
    fill-opacity="0.95"
  />

  <!-- Subtle outer ring -->
  <circle cx="32" cy="32" r="31.5" fill="none" stroke="#E5E7EB" stroke-width="1" />
</svg>
